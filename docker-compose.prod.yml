version: '3.9'

# Shared defaults for Node services
x-api: &api-base
  build: .
  env_file: .env.prod
  restart: always

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: always
    env_file: .env.prod
    environment:
      POSTGRES_DB:       bakala
      POSTGRES_USER:     ${POSTGRES_USER:-bakala}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U ${POSTGRES_USER:-bakala}"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
        --appendonly yes
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: [CMD-SHELL, "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      retries: 10
    env_file: .env.prod

  elasticsearch:
    image: elasticsearch:8.13.4
    restart: always
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: [CMD-SHELL, "curl -sf http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      retries: 15

  # ── DB migration (runs once, exits 0 on success) ────────────────────────────

  migrate:
    <<: *api-base
    command: npx tsx src/db/migrate.ts
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    <<: *api-base
    command: npx tsx src/main.ts
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      postgres:      { condition: service_healthy }
      redis:         { condition: service_healthy }
      elasticsearch: { condition: service_healthy }
      migrate:       { condition: service_completed_successfully }
    healthcheck:
      test: [CMD-SHELL, "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      retries: 5

  notifications-svc:
    <<: *api-base
    command: npx tsx src/services/notifications/index.ts
    depends_on:
      redis: { condition: service_healthy }

  tracking-svc:
    <<: *api-base
    command: npx tsx src/services/tracking/index.ts
    environment:
      NODE_ENV: production
    depends_on:
      redis: { condition: service_healthy }

  discovery-svc:
    <<: *api-base
    command: npx tsx src/services/discovery/index.ts
    environment:
      NODE_ENV: production
    depends_on:
      postgres:      { condition: service_healthy }
      redis:         { condition: service_healthy }
      elasticsearch: { condition: service_healthy }

  frontend:
    build: ./frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      api: { condition: service_healthy }

volumes:
  pgdata:
  redisdata:
  esdata:
