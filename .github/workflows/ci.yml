name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  integration:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bakala_test
          POSTGRES_USER: bakala
          POSTGRES_PASSWORD: secret
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5

    env:
      DATABASE_URL: postgres://bakala:secret@localhost:5432/bakala_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-32-chars-minimum!!
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push schema
        run: npm run db:push

      - name: Smoke test — server starts
        run: |
          timeout 15 npx tsx src/main.ts &
          sleep 4
          curl -f http://localhost:3000/health || (echo "Health check failed" && exit 1)
          kill %1
