server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache immutable Vite build hashes
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # WebSocket — must come before the generic API block
    location /tracking/ws {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # All backend routes — forward to the API container
    location ~ ^/(auth|stores|catalog|inventory|cart|orders|fulfillment|tracking|billing|reports|health|discovery|notifications|scheduling) {
        proxy_pass          http://api:3000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    Cookie            $http_cookie;
        proxy_pass_header   Set-Cookie;
    }

    # SPA catch-all — send all other requests to React
    location / {
        try_files $uri $uri/ /index.html;
    }
}
